<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Prisha ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
    color: white;
}

/* Background */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7') no-repeat center/cover;
    filter: blur(8px);
    z-index: -1;
}

/* Glass box */
.container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    padding: 30px;
    border-radius: 25px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
}

/* Title */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 42px;
    color: #ff4d6d;
}

/* Buttons */
button {
    margin: 10px;
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(45deg, #ff4d6d, #ff758f);
    color: white;
    cursor: pointer;
    transition: 0.3s;
    position: relative;
}

button:hover {
    transform: scale(1.1);
}

/* Hidden section */
#nextPage {
    display: none;
}

/* iframe */
iframe {
    width: 100%;
    height: 220px;
    border-radius: 15px;
    border: none;
}

/* Floating hearts */
.heart {
    position: absolute;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container" id="main">
    <h1>Prisha ❤️</h1>
    <p>Do you love me? 😘</p>

    <button onclick="yesClick()">Yes 💖</button>
    <button id="noBtn" onmouseover="moveNo()">No 😜</button>
</div>

<div class="container" id="nextPage">
    <h1>I knew it 😍</h1>
    <p>You are my forever 💖</p>

    <!-- Your song -->
    <iframe src="https://www.youtube.com/embed/49x8GA2axfc?autoplay=1"></iframe>
</div>

<script>
// Move NO button 😆
function moveNo() {
    const btn = document.getElementById("noBtn");
    btn.style.position = "absolute";
    btn.style.top = Math.random() * 80 + "%";
    btn.style.left = Math.random() * 80 + "%";
}

// YES click
function yesClick() {
    document.getElementById("main").style.display = "none";
    document.getElementById("nextPage").style.display = "block";
}

// Floating hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (20 + Math.random() * 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}, 500);
</script>

</body>
</html>
